<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Essentia Belle | Project Presentation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .slide-enter { transform: translateX(100%); opacity: 0; }
        .slide-enter-active { transform: translateX(0); opacity: 1; transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .slide-exit { transform: translateX(0); opacity: 1; }
        .slide-exit-active { transform: translateX(-100%); opacity: 0; transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#fdf8f4',
                        secondary: '#d4af37',
                        ink: '#1a1a1a',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-primary text-ink overflow-hidden" x-data="{ current: 0, slides: [
    { title: 'Essentia Belle', subtitle: 'The Future of Digital Fragrance', content: 'A luxury e-commerce experience combining high-end aesthetics with powerful inventory technology.', bg: 'bg-white' },
    { title: 'The Vision', subtitle: 'Luxury Meets Tech', content: 'Crafted with React 19 and Express, providing a buttery-smooth experience for high-ticket fragrance shopping.', bg: 'bg-stone-50' },
    { title: 'Inventory Control', subtitle: 'Admin Portals', content: 'Complete dashboard for managing products, prices, and notes. Supports local image uploads with seamless base64 processing.', bg: 'bg-white' },
    { title: 'Snapshot System', subtitle: 'Brand Protection', content: 'Exclusive technology that lets you save your current shop state as a permanent default. Restore your setup with one click.', bg: 'bg-stone-50' },
    { title: 'Performance', subtitle: 'Optimized Speed', content: 'SQLite integration with transactional integrity ensures your boutique remains fast even as your collection grows.', bg: 'bg-white' }
]}">

    <!-- Progress Bar -->
    <div class="fixed top-0 left-0 w-full h-1 bg-gray-100 z-50">
        <div class="h-full bg-secondary transition-all duration-500" :style="`width: ${(current + 1) / slides.length * 100}%`"></div >
    </div>

    <div class="h-screen w-full flex items-center justify-center relative p-8">
        <!-- Decoration -->
        <div class="absolute top-0 right-0 w-1/3 h-1/3 bg-secondary/5 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-0 left-0 w-1/3 h-1/3 bg-secondary/5 blur-[120px] rounded-full"></div>

        <template x-for="(slide, index) in slides" :key="index">
            <div 
                x-show="current === index"
                x-transition:enter="slide-enter-active"
                x-transition:leave="slide-exit-active"
                class="absolute inset-0 flex items-center justify-center p-8 md:p-20"
            >
                <div class="max-w-4xl w-full">
                    <div class="text-secondary font-bold tracking-[0.3em] uppercase text-xs mb-6" x-text="slide.subtitle"></div>
                    <h1 class="text-6xl md:text-8xl font-serif font-black mb-8 leading-tight" x-text="slide.title"></h1>
                    <p class="text-xl md:text-3xl text-ink/60 leading-relaxed max-w-2xl font-light" x-text="slide.content"></p>
                </div>
            </div>
        </template>

        <!-- Navigation -->
        <div class="fixed bottom-12 right-12 flex space-x-4 z-40">
            <button 
                @click="current = current > 0 ? current - 1 : slides.length - 1"
                class="p-6 bg-white border border-gray-200 rounded-full hover:bg-stone-50 transition-all opacity-50 hover:opacity-100"
            >
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <button 
                @click="current = (current + 1) % slides.length"
                class="p-6 bg-ink text-white rounded-full hover:bg-secondary transition-all shadow-2xl"
            >
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </button>
        </div>

        <!-- Indicator -->
        <div class="fixed bottom-12 left-12 text-[10px] font-bold tracking-widest text-ink/20 uppercase">
            <span x-text="current + 1"></span> / <span x-text="slides.length"></span> — Essentia Belle Project
        </div>
    </div>

    <!-- Instructions Overlay -->
    <div class="fixed top-8 left-12 flex items-center space-x-3 opacity-20 pointer-events-none">
        <div class="px-2 py-1 border border-ink text-ink text-[10px] font-bold">SPACE</div>
        <span class="text-[10px] font-bold uppercase tracking-widest">Next Slide</span>
    </div>

    <script>
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowRight') {
                const btn = document.querySelector('button:last-child');
                btn.click();
            }
            if (e.code === 'ArrowLeft') {
                const btn = document.querySelector('button:first-child');
                btn.click();
            }
        });
    </script>
</body>
</html>
